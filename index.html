<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StreamCut Pro Legal</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --border: rgba(148, 163, 184, 0.22);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }
    h1 { margin-top: 0; font-size: 2rem; }
    p { line-height: 1.65; color: var(--muted); }
    .links {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }
    a {
      display: block;
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
    }
    a:hover { border-color: var(--accent); color: #fff; }
    small { display: block; margin-top: 24px; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>StreamCut Pro Legal Pages</h1>
    <p>
      Public legal documents for the StreamCut Pro application. These pages are intended for
      app-review and sandbox credential submissions, including TikTok developer settings.
    </p>
    <div class="links">
      <a href="./terms.html">Terms of Service</a>
      <a href="./privacy.html">Privacy Policy</a>
    </div>
    <small>Last updated: March 16, 2026</small>
  </main>
</body>
</html>
